                            <h1>Первое приложение с .NET CLI</h1>
                            <p>Для создания графических интерфейсов с помощью платформы .NET применяются разные технологии - Window Forms, WPF, UWP. Однако наиболее простой и удобной платформой до сих пор остается Window Forms или сокращенно WinForms. Данное руководство ставит своей целью дать понимание принципов создания графических интерфейсов с помощью технологии WinForms и работы основных элементов управления.</p>
                            
                            <p>Создадим первое приложение на C# и Windows Forms. Что нам для этого потребуется? Прежде всего необходим текстовый редактор для написания кода программы. Можно взять любой понравившийся текстовый редактор, например, Visual Studio Code. Также для компиляции и запуска программы нам потребуется .NET SDK. Для его установки перейдем на официальный сайт по ссылке .NET SDK.</p>

                            <p>После установки .NET SDK для первого проекта определим какую-нибудь папку. Например, в моем случае это будет папка <code>C:\\dotnet\\winforms\\helloapp</code>. Откроем терминал/командную строку и перейдем к созданной папке проекта с помощью команды <code>cd</code>:</p>
                            
                            <pre><code class="language-bash">cd C:\\dotnet\\winforms\\helloapp</code></pre>
                            
                            <p>В данном случае мы для создания и запуска проекта мы будем использовать встроенную инфраструктуру .NET CLI, которая устанавливается вместе с .NET SDK.</p>

                            <h3>Создание проекта</h3>
                            <p>Для создания проекта в .NET CLI применяется команда <code>dotnet new</code>, после которой указывается тип проекта. Для создания проекта Windows Forms применяется шаблон - <code>winforms</code>. Поэтому введем в терминале команду <code>dotnet new winforms</code>:</p>
                            
                            <pre><code class="language-bash">C:\\Users\\eugen>cd C:\\dotnet\\winforms\\helloapp

C:\\dotnet\\winforms\\helloapp>dotnet new winforms
Шаблон "Приложение Windows Forms" успешно создан.

Идет обработка действий после создания...
Восстановление C:\\dotnet\\winforms\\helloapp\\helloapp.csproj:
  Определение проектов для восстановления...
  Восстановлен C:\\dotnet\\winforms\\helloapp\\helloapp.csproj (за 1,04 sec).
Восстановление выполнено.

C:\\dotnet\\winforms\\helloapp></code></pre>

                            <p>После выполнения этой команды у нас будет создан следующий проект:</p>
                            <div class="my-6 p-4 bg-slate-100 rounded-lg border border-slate-200 text-center text-slate-500">
                                <img src="img/1.16.png" alt="Структура проекта Windows Forms" class="mx-auto rounded shadow-sm">
                                <p class="text-sm mt-2">Структура проекта Windows Forms</p>
                            </div>

                            <h3>Структура проекта Windows Forms</h3>
                            <p>Рассмотрим базовую структуру простейшего стандартного проекта Windows Forms:</p>
                            <ul>
                                <li><strong>helloapp.csproj</strong>: стандартный файл проекта C#, который соответствует назанию проекта (по умолчанию названию каталога) и описывает все его настройки.</li>
                                <li><strong>helloapp.csproj.user</strong>: дополнительный файл проекта C#, который хранит специфичные для текущего пользователя настройки.</li>
                                <li><strong>Form1.cs</strong>: содержит класс формы, которая по умолчанию запускается при старте приложения</li>
                                <li><strong>Form1.Designer.cs</strong>: он содержит определение компонентов формы, добавленных на форму в графическом дизайнере (графический дизайнер Windows Forms на данный момент официально доступен только в Visual Studio)</li>
                                <li><strong>Program.cs</strong>: определяет класс Program, который запускается при старте приложения и запускает форму Form1</li>
                            </ul>

                            <p>Например, посмотрим на содержимое файла <code>helloapp.csproj</code>:</p>
                            <pre><code class="language-xml">&lt;Project Sdk="Microsoft.NET.Sdk"&gt;
  &lt;PropertyGroup&gt;
    &lt;OutputType&gt;WinExe&lt;/OutputType&gt;
    &lt;TargetFramework&gt;net8.0-windows&lt;/TargetFramework&gt;
    &lt;Nullable&gt;enable&lt;/Nullable&gt;
    &lt;UseWindowsForms&gt;true&lt;/UseWindowsForms&gt;
    &lt;ImplicitUsings&gt;enable&lt;/ImplicitUsings&gt;
  &lt;/PropertyGroup&gt;
&lt;/Project&gt;</code></pre>

                            <p>Для компиляции приложения Windows Forms указаны следующие настройки:</p>
                            <ul>
                                <li><strong>OutputType</strong>: определяет выходной тип проекта. Должен иметь значение <code>WinExe</code> - то есть выполняемое приложение с расширением exe под Windows.</li>
                                <li><strong>TargetFramework</strong>: определяет применяемую для компиляции версию фреймворка .NET. Поскольку при создании проекта была выбрана версия .NET 8, а сам проект зависит от компонентов Windows, то здесь должно быть значение <code>net7.0-windows</code> (или выше, например net8.0-windows).</li>
                                <li><strong>Nullable</strong>: подключает в проект функциональность ссылочных nullable-типов.</li>
                                <li><strong>UseWindowsForms</strong>: указывает, будет ли проект использовать Windows Forms (для этого устанавливается значение <code>true</code>).</li>
                                <li><strong>ImplicitUsings</strong>: подключает в проект функциональность неявно подключаемых глобальных пространств имен.</li>
                            </ul>

                            <h3>Запуск проекта</h3>
                            <p>Проект по умолчанию не представляет какой-то грандиозной функциональности, тем не менее этот проект мы уже можем запустить. Итак, запустим проект. Для этого выполним команду <code>dotnet run</code>:</p>
                            <pre><code class="language-bash">C:\\dotnet\\winforms\\helloapp>dotnet run</code></pre>

                            <p>При запуске запускается графическая форма, код которой определяет класс Form1:</p>
                            <div class="my-6 p-4 bg-slate-100 rounded-lg border border-slate-200 text-center text-slate-500">
                                <img src="img/1.18.png" alt="Запуск приложения Windows Forms" class="mx-auto rounded border border-slate-300 shadow-md">
                                <p class="text-sm mt-2">Запуск приложения</p>
                            </div>

                            <p>Файл <code>Program.cs</code> определяет точку входа в приложение:</p>
                            <pre><code class="language-csharp">namespace helloapp;

static class Program
{
    [STAThread]
    static void Main()
    {
        ApplicationConfiguration.Initialize();
        Application.Run(new Form1());
    }    
}</code></pre>

                            <p>Метод <code>Main</code> снабжен атрибутом <code>[STAThread]</code>. Этот атрибут, грубо говоря, необходим для корректной работы компонентов Windows. В самом методе сначала вызывается метод <code>ApplicationConfiguration.Initialize()</code>, который устанавливает некоторую базовую конфигурацию приложения.</p>
                            <p>Затем вызывается метод <code>Application.Run(new Form1());</code>, в который передается объект отображаемой по умолчанию на экране формы. То есть, когда мы запустим приложение, сработает метод <code>Main</code>, в котором будет вызван метод <code>Application.Run(new Form1())</code>, благодаря чему мы увидим форму Form1 на экране.</p>

                            <h3>Определение формы</h3>
                            <p>Теперь посмотрим на определение формы и немного изменим его. Для этого откроем файл <code>Form1.cs</code> в текстовом редакторе. По умолчанию он выглядит следующим образом:</p>
                            <pre><code class="language-csharp">namespace helloapp;

public partial class Form1 : Form
{
    public Form1()
    {
        InitializeComponent();
    }
}</code></pre>

                            <p>Класс формы - <code>Form1</code> представляет графическую форму - фактически то окно, которое мы увидим на экране при запуске проекта. Этот класс определяется как частичный (с модификатором <code>partial</code>) и наследуется от встроенного класса <code>Form</code>, который содержит базовую функциональность форм.</p>
                            <p>В самом классе Form1 определен по умолчанию только конструктор, где вызывается метод <code>InitializeComponent()</code>, который выполняет инициализацию компонентов формы из файла дизайнера <code>Form1.Designer.cs</code>. По сути именно код этого файла передается выше через вызов <code>InitializeComponent()</code>.</p>
                            
                            <p>Теперь изменим его код следующим образом:</p>
                            <pre><code class="language-csharp">namespace helloapp;

public partial class Form1 : Form
{
    public Form1()
    {
        InitializeComponent();
        
        // определяем кнопку
        Button button = new Button();
        // текст кнопки
        button.Text = "Click";
        // положение кнопки
        button.Location = new Point(50, 50);
        // размер кнопки
        button.Size = new Size { Width = 80, Height = 30 };
        // обработчик нажатия кнопки
        button.Click += (o, e) => MessageBox.Show("Hello METANIT.COM!");
        
        // добавление кнопки на форму
        this.Controls.Add(button);
    }
}</code></pre>

                            <p>В данном случае на форму добавляется кнопка, и у нее настраиваются различные свойства, как текст, положение на форме, размер, а также обработчик нажатия. Заново запустим проект, и нам отобразится та же форма, которая теперь будет содержать кнопку. И по нажатию на кнопку появится маленькое окно с сообщением.</p>

                            <h1>Первое приложение в Visual Studio</h1>

                            <p>Стоит отметить, что среди шаблонов можно увидеть еще тип <em>Windows Forms App (.NET Framework)</em> - его НЕ надо выбирать, необходим именно тип <strong>Windows Forms App</strong>.</p>

                            <p>После этого Visual Studio откроет наш проект с созданными по умолчанию файлами:</p>
                            
                            <div class="my-6 p-4 bg-slate-100 rounded-lg border border-slate-200 text-center text-slate-500">

                            <p>Справа находится окно Solution Explorer, в котором можно увидеть структуру нашего проекта. Практически это тот же проект, который создается с помощью .NET CLI:</p>

                            <p>При выборе формы в окне дизайнера внизу справа под структурой проекта мы сможем найти окно <strong>Properties</strong> (Свойства). Так как у меня в данный момент выбрана форма как элемент управления, то в этом поле отображаются свойства, связанные с формой.</p>
                            
                            <p>Теперь найдем в этом окне свойство формы Text и изменим его значение на любое другое. Таким образом мы поменяли заголовок формы. И подобным образом мы можем поменять другие свойства формы, которые доступны в окне свойств.</p>

                            <p>Но Visual Studio имеет еще одну связанную функциональность. Она обладает панелью графических инструментов. И мы можем, вместо создания элементов управления в коде C#, просто переносить их на форму с панели инструментов с помощью мыши. Так, перенесем на форму какой-нибудь элемент управления, например, кнопку. Для этого найдем в левой части Visual Studio вкладку <strong>Toolbox</strong> (Панель инструментов). Нажмем на эту вкладку, и у нас откроется панель с элементами, откуда мы можем с помощью мыши перенести на форму любой элемент:</p>

                            <h3>Обработка событий</h3>

                            <h1>Основы форм</h1>
                            <p>Внешний вид приложения является нам преимущественно через формы. Формы являются основными строительными блоками. Они предоставляют контейнер для различных элементов управления. А механизм событий позволяет элементам формы отзываться на ввод пользователя, и, таким образом, взаимодействовать с пользователем.</p>
                            
                            <p>При открытии проекта в Visual Studio в графическом редакторе мы можем увидеть визуальную часть формы - ту часть, которую мы видим после запуска приложения и куда мы переносим элементы с панели управления. Но на самом деле форма скрывает мощный функционал, состоящий из методов, свойств, событий и прочее. Рассмотрим основные свойства форм.</p>
                            
                            <p>Если мы запустим приложение, то нам отобразится одна пустая форма. Однако даже такой простой проект с пустой формой имеет несколько компонентов:</p>
                            
                            <div class="my-6 p-4 bg-slate-100 rounded-lg border border-slate-200 text-center text-slate-500">
                                <img src="img/2.3.png" alt="Компоненты формы" class="mx-auto rounded border border-slate-300 shadow-md">
                                <p class="text-sm mt-2">Структура файлов формы</p>
                            </div>

                            <p>Несмотря на то, что мы видим только форму, но стартовой точкой входа в графическое приложение является класс Program, расположенный в файле <code>Program.cs</code>:</p>
                            
                            <pre><code class="language-csharp">using System;
using System.Collections.Generic;
using System.Linq;
using System.Threading.Tasks;
using System.Windows.Forms;

namespace HelloApp
{
    static class Program
    {
        [STAThread]
        static void Main()
        {
            Application.EnableVisualStyles();
            Application.SetCompatibleTextRenderingDefault(false);
            Application.Run(new Form1());
        }
    }
}</code></pre>

                            <p>Сама форма сложна по содержанию. Она делится на ряд компонентов. Так, в структуре проекта есть файл <code>Form1.Designer.cs</code>, который выглядит примерно так:</p>

                            <p>Здесь объявляется частичный класс формы Form1, которая имеет два метода: <code>Dispose()</code>, который выполняет роль деструктора объекта, и <code>InitializeComponent()</code>, который устанавливает начальные значения свойств формы.</p>
                            <p>При добавлении элементов управления, например, кнопок, их описание также добавляется в этот файл.</p>
                            <p>Но на практике мы редко будем сталкиваться с этим классом, так как они выполняет в основном дизайнерские функции - установка свойств объектов, установка переменных.</p>
                            
                            <p>Еще один файл - <code>Form1.resx</code> - хранит ресурсы формы. Как правило, ресурсы используются для создания однообразных форм сразу для нескольких языковых культур.</p>
                            
                            <p>И более важный файл - <code>Form1.cs</code>, который в структуре проекта называется просто Form1, содержит код или программную логику формы:</p>

                            <pre><code class="language-csharp">using System;

using System.ComponentModel;
using System.Data;
using System.Drawing;
using System.Linq;
using System.Text;
using System.Threading.Tasks;

namespace HelloApp

}</code></pre>

                            <p>По умолчанию здесь есть только конструктор формы, в котором просто вызывается метод <code>InitializeComponent()</code>, объявленный в файле дизайнера <code>Form1.Designer.cs</code>. Именно с этим файлом мы и будем больше работать.</p>
                        `

                            <h1>Основные свойства форм</h1>
                            <p>С помощью специального окна Properties (Свойства) справа Visual Studio предоставляет нам удобный интерфейс для управления свойствами элемента:</p>
                            
                            <div class="my-6 p-4 bg-slate-100 rounded-lg border border-slate-200 text-center text-slate-500">

                            <p>Большинство этих свойств оказывает влияние на визуальное отображение формы. Пробежимся по основным свойствам:</p>
                            <ul>

                                <li><strong>BackgroundImage</strong>: указывает на фоновое изображение формы</li>
                                <li><strong>BackgroundImageLayout</strong>: определяет, как изображение, заданное в свойстве BackgroundImage, будет располагаться на форме.</li>
                                <li><strong>ControlBox</strong>: указывает, отображается ли меню формы. В данном случае под меню понимается меню самого верхнего уровня, где находятся иконка приложения, заголовок формы, а также кнопки минимизации формы и крестик. Если данное свойство имеет значение false, то мы не увидим ни иконку, ни крестика, с помощью которого обычно закрывается форма</li>
                                <li><strong>Cursor</strong>: определяет тип курсора, который используется на форме</li>
                                <li><strong>Enabled</strong>: если данное свойство имеет значение false, то она не сможет получать ввод от пользователя, то есть мы не сможем нажать на кнопки, ввести текст в текстовые поля и т.д.</li>
                                <li><strong>Font</strong>: задает шрифт для всей формы и всех помещенных на нее элементов управления. Однако, задав у элементов формы свой шрифт, мы можем тем самым переопределить его</li>
                                <li><strong>ForeColor</strong>: цвет шрифта на форме</li>
                                <li><strong>FormBorderStyle</strong>: указывает, как будет отображаться граница формы и строка заголовка. Устанавливая данное свойство в None можно создавать внешний вид приложения произвольной формы</li>

                                <li><strong>MaximizeBox</strong>: указывает, будет ли доступна кнопка максимизации окна в заголовке формы</li>
                                <li><strong>MinimizeBox</strong>: указывает, будет ли доступна кнопка минимизации окна</li>

                            <h3>Программная настройка свойств</h3>
                            <p>С помощью значений свойств в окне Свойства мы можем изменить по своему усмотрению внешний вид формы, но все то же самое мы можем сделать динамически в коде. Перейдем к коду, для этого нажмем правой кнопкой мыши на форме и выберем в появившемся контекстном меню View Code (Просмотр кода). Перед нами открывается файл кода <code>Form1.cs</code>. Изменим его следующим образом:</p>

<pre><code class="language-csharp">using System;

                            <p>В данном случае мы настроили несколько свойств отображения формы: заголовок, фоновый цвет, ширину и высоту. При использовании конструктора формы надо учитывать, что весь остальной код должен идти после вызова метода <code>InitializeComponent()</code>, поэтому все установки свойств здесь расположены после этого метода.</p>
                            
                            <div class="my-6 p-4 bg-slate-100 rounded-lg border border-slate-200 text-center text-slate-500">

                            <h3>Установка размеров формы</h3>
                            <p>Для установки размеров формы можно использовать такие свойства как Width/Height или Size. Width/Height принимают числовые значения, как в вышеприведенном примере. При установке размеров через свойство Size, нам надо присвоить свойству объект типа Size:</p>

<pre><code class="language-csharp">this.Size = new Size(200, 150);</code></pre>
                            <p>Объект Size в свою очередь принимает в конструкторе числовые значения для установки ширины и высоты.</p>

                            <h3>Начальное расположение формы</h3>
                            <p>Начальное расположение формы устанавливается с помощью свойства <code>StartPosition</code>, которое может принимать одно из следующих значений:</p>
                            <ul>
                                <li><strong>Manual</strong>: Положение формы определяется свойством Location</li>
                                <li><strong>CenterScreen</strong>: Положение формы в центре экрана</li>
                                <li><strong>WindowsDefaultLocation</strong>: Позиция формы на экране задается системой Windows, а размер определяется свойством Size</li>
                                <li><strong>WindowsDefaultBounds</strong>: Начальная позиция и размер формы на экране задается системой Windows</li>
                                <li><strong>CenterParent</strong>: Положение формы устанавливается в центре родительского окна</li>
                            </ul>
                            <p>Все эти значения содержатся в перечислении <code>FormStartPosition</code>, поэтому, чтобы, например, установить форму в центре экрана, нам надо прописать так:</p>

<pre><code class="language-csharp">this.StartPosition = FormStartPosition.CenterScreen;</code></pre>

                            <h3>Фон и цвета формы</h3>

this.ForeColor = Color.Red;</code></pre>

                            <p>Кроме того, мы можем в качестве фона задать изображение в свойстве <code>BackgroundImage</code>, выбрав его в окне свойств или в коде, указав путь к изображению:</p>

<pre><code class="language-csharp">this.BackgroundImage = Image.FromFile("C:\\\\Users\\\\Eugene\\\\Pictures\\\\3332.jpg");</code></pre>

                            <p>Чтобы должным образом настроить нужное нам отображение фоновой картинки, надо использовать свойство <code>BackgroundImageLayout</code>, которое может принимать одно из следующих значений:</p>
                            <ul>
                                <li><strong>None</strong>: Изображение помещается в верхнем левом углу формы и сохраняет свои первоначальные значения</li>
                                <li><strong>Tile</strong>: Изображение располагается на форме в виде мозаики</li>
                                <li><strong>Center</strong>: Изображение располагается по центру формы</li>
                                <li><strong>Stretch</strong>: Изображение растягивается до размеров формы без сохранения пропорций</li>
                                <li><strong>Zoom</strong>: Изображение растягивается до размеров формы с сохранением пропорций</li>
                            </ul>

                            <p>Например, расположим форму по центру экрана:</p>
<pre><code class="language-csharp">this.StartPosition = FormStartPosition.CenterScreen;</code></pre>

                        content: `
                            <h1>Добавление форм. Взаимодействие между формами</h1>
                            <p>Чтобы добавить еще одну форму в проект, нажмем на имя проекта в окне Solution Explorer (Обозреватель решений) правой кнопкой мыши и выберем <strong>Add (Добавить) -&gt; Windows Form...</strong></p>

                            <div class="my-6 p-4 bg-slate-100 rounded-lg border border-slate-200 text-center text-slate-500">

                            <p>Дадим новой форме какое-нибудь имя, например, <code>Form2.cs</code>:</p>

                            <div class="my-6 p-4 bg-slate-100 rounded-lg border border-slate-200 text-center text-slate-500">

                            </div>

                            <p>Итак, у нас в проект была добавлена вторая форма. Теперь попробуем осуществить взаимодействие между двумя формами. Допустим, первая форма по нажатию на кнопку будет вызывать вторую форму. Во-первых, добавим на первую форму Form1 кнопку и двойным щелчком по кнопке перейдем в файл кода. Итак, мы попадем в обработчик события нажатия кнопки, который создается по умолчанию после двойного щелчка по кнопке:</p>

<pre><code class="language-csharp">private void button1_Click(object sender, EventArgs e)
{

}</code></pre>

                            <p>Теперь добавим в него код вызова второй формы. У нас вторая форма называется Form2, поэтому сначала мы создаем объект данного класса, а потом для его отображения на экране вызываем метод <code>Show()</code>:</p>

<pre><code class="language-csharp">private void button1_Click(object sender, EventArgs e)
{
    Form2 newForm = new Form2();
    newForm.Show();
}</code></pre>

                            <p>Теперь сделаем наоборот - чтобы вторая форма воздействовала на первую. Пока вторая форма не знает о существовании первой. Чтобы это исправить, надо второй форме как-то передать сведения о первой форме. Для этого воспользуемся передачей ссылки на форму в конструкторе.</p>

                            <p>Итак перейдем ко второй форме и перейдем к ее коду - нажмем правой кнопкой мыши на форму и выберем View Code (Просмотр кода). Пока он пустой и содержит только конструктор. Поскольку C# поддерживает перегрузку методов, то мы можем создать несколько методов и конструкторов с разными параметрами и в зависимости от ситуации вызывать один из них. Итак, изменим файл кода второй формы на следующий:</p>

<pre><code class="language-csharp">using System;
using System.Collections.Generic;
using System.ComponentModel;
using System.Data;
using System.Drawing;
using System.Linq;
using System.Text;
using System.Threading.Tasks;
using System.Windows.Forms;

namespace HelloApp
{
    public partial class Form2 : Form
    {
        public Form2()
        {
            InitializeComponent();
        }

        public Form2(Form1 f)
        {
            InitializeComponent();
            f.BackColor = Color.Yellow;
        }
    }
}</code></pre>

                            <p>Фактически мы только добавили здесь новый конструктор <code>public Form2(Form1 f)</code>, в котором мы получаем первую форму и устанавливаем ее фон в желтый цвет. Теперь перейдем к коду первой формы, где мы вызывали вторую форму и изменим его на следующий:</p>

<pre><code class="language-csharp">private void button1_Click(object sender, EventArgs e)
{
    Form2 newForm = new Form2(this);
    newForm.Show();
}</code></pre>

                            <p>Поскольку в данном случае ключевое слово <code>this</code> представляет ссылку на текущий объект - объект Form1, то при создании второй формы она будет получать ее (ссылку) и через нее управлять первой формой.</p>
                            <p>Теперь после нажатия на кнопку у нас будет создана вторая форма, которая сразу изменит цвет первой формы.</p>

                            <p>Мы можем также создавать объекты и текущей формы:</p>

<pre><code class="language-csharp">private void button1_Click(object sender, EventArgs e)
{
    Form1 newForm1 = new Form1();
    newForm1.Show();
         
    Form2 newForm2 = new Form2(newForm1);
    newForm2.Show();
}</code></pre>

                        title: "События в Windows Forms. События формы",
                        content: `
                            <h1>События в Windows Forms. События формы</h1>
                            <p>Для взаимодействия с пользователем в Windows Forms используется механизм событий. События в Windows Forms представляют стандартные события на C#, только применяемые к визуальным компонентам и подчиняются тем же правилам, что события в C#. Но создание обработчиков событий в Windows Forms все же имеет некоторые особенности.</p>
                            
                            <p>Прежде всего в WinForms есть некоторый стандартный набор событий, который по большей части имеется у всех визуальных компонентов. Отдельные элементы добавляют свои события, но принципы работы с ними будут похожие. Чтобы посмотреть все события элемента, нам надо выбрать этот элемент в поле графического дизайнера и перейти к вкладке событий на панели форм. Например, события формы:</p>

                            <div class="my-6 p-4 bg-slate-100 rounded-lg border border-slate-200 text-center text-slate-500">
                                <img src="img/2.7.png" alt="Вкладка событий в окне Properties" class="mx-auto rounded border border-slate-300 shadow-md">
                                <p class="text-sm mt-2">Вкладка событий (Events) в окне свойств</p>
                            </div>

                            <p>Чтобы добавить обработчик, можно просто два раза нажать по пустому полю рядом с названием события, и после этого Visual Studio автоматически сгенерирует обработчик события. Например, нажмем для создания обработчика для события <code>Load</code>:</p>

                            <div class="my-6 p-4 bg-slate-100 rounded-lg border border-slate-200 text-center text-slate-500">
                                <img src="img/2.8.png" alt="Событие Load формы" class="mx-auto rounded border border-slate-300 shadow-md">
                                <p class="text-sm mt-2">Генерация обработчика события Load</p>
                            </div>

                            <p>И в этом поле отобразится название метода обработчика события Load. По умолчанию он называется <code>Form1_Load</code>.</p>
                            <p>Если мы перейдем в файл кода формы <code>Form1.cs</code>, то увидим автосгенерированный метод <code>Form1_Load</code>:</p>

<pre><code class="language-csharp">public partial class Form1 : Form
{
    public Form1()
    {
        InitializeComponent();
    }

    private void Form1_Load(object sender, EventArgs e)
    {

    }
}</code></pre>

                            <p>И при каждой загрузке формы будет срабатывать код в обработчике <code>Form1_Load</code>.</p>
                            <p>Как правило, большинство обработчиков различных визуальных компонентов имеют два параметра: <code>sender</code> - объект, инициировавший событие, и аргумент, хранящий информацию о событии (в данном случае <code>EventArgs e</code>).</p>
                            
                            <p>Но это только обработчик. Добавление же обработчика, созданного таким образом, производится в файле <code>Form1.Designer.cs</code>:</p>

<pre><code class="language-csharp">namespace HelloApp
{
    partial class Form1
    {
        private System.ComponentModel.IContainer components = null;

        protected override void Dispose(bool disposing)
        {
            if (disposing && (components != null))
            {
                components.Dispose();
            }
            base.Dispose(disposing);
        }
        private void InitializeComponent()
        {
            this.SuspendLayout();

            this.AutoScaleDimensions = new System.Drawing.SizeF(6F, 13F);
            this.AutoScaleMode = System.Windows.Forms.AutoScaleMode.Font;
            this.ClientSize = new System.Drawing.Size(284, 261);
            this.Name = "Form1";
            // добавление обработчика 
            this.Load += new System.EventHandler(this.Form1_Load);
            this.ResumeLayout(false);
        }
    }
}</code></pre>

                            <p>Для добавления обработчика используется стандартный синтаксис C#: <code>this.Load += new System.EventHandler(this.Form1_Load)</code></p>
                            <p>Поэтому если мы захотим удалить созданный подобным образом обработчик, то нам надо не только удалить метод из кода формы в <code>Form1.cs</code>, но и удалить добавление обработчика в этом файле.</p>
                            
                            <p>Однако мы можем добавлять обработчики событий и программно, например, в конструкторе формы:</p>

<pre><code class="language-csharp">using System;
using System.Collections.Generic;
using System.ComponentModel;
using System.Data;
using System.Drawing;
using System.Linq;
using System.Text;
using System.Threading.Tasks;
using System.Windows.Forms;

namespace HelloApp
{
    public partial class Form1 : Form
    {
        public Form1()
        {
            InitializeComponent();
            this.Load += LoadEvent;
        }

        private void Form1_Load(object sender, EventArgs e)
        {
        }

        private void LoadEvent(object sender, EventArgs e)
        {
            this.BackColor = Color.Yellow;
        }
    }
}</code></pre>

                            <p>Кроме ранее созданного обработчика <code>Form1_Load</code> здесь также добавлен другой обработчик загрузки формы: <code>this.Load += LoadEvent;</code>, который устанавливает в качестве фона желтый цвет.</p>
                        `

                            <h1>Создание непрямоугольных форм. Закрытие формы</h1>
                            <p>По умолчанию все формы в Windows Forms являются прямоугольными. Однако мы можем создавать и непрямоугольные произвольные формы. Для этого используется свойство <code>Region</code>. В качестве значения оно принимает объект одноименного класса Region.</p>
                            
                            <div class="my-6 p-4 bg-slate-100 rounded-lg border border-slate-200 text-center text-slate-500">
                                <img src="img/2.6.png" alt="Непрямоугольная форма" class="mx-auto rounded border border-slate-300 shadow-md">
                                <p class="text-sm mt-2">Круглая форма с кнопкой закрытия</p>
                            </div>

                            <p>При создании непрямоугольных форм, как правило, не используются границы формы, так как границы задаются этим объектом Region. Чтобы убрать границы формы, надо присвоить у формы свойству <code>FormBorderStyle</code> значение <code>None</code>.</p>
                            
                            <p>И еще один аспект, который надо учитывать, заключается в перемещении, закрытии, максимизации и минимизации форм. То есть в данном случае, как в обычной форме, мы не сможем нажать на крестик, чтобы закрыть форму, не сможем ее переместить на новое место. Поэтому нам надо дополнительно определять для этого программную логику.</p>
                            
                            <p>Итак, перейдем к коду формы и изменим его следующим образом:</p>

<pre><code class="language-csharp">using System;
using System.Collections.Generic;
using System.ComponentModel;
using System.Data;
using System.Drawing;
using System.Linq;
using System.Text;
using System.Threading.Tasks;
using System.Windows.Forms;

namespace HelloApp
{
    public partial class Form1 : Form
    {
        Point moveStart; // точка для перемещения

        public Form1()
        {
            InitializeComponent();
            this.FormBorderStyle = FormBorderStyle.None;
            this.BackColor = Color.Yellow;
            Button button1 = new Button
            {
                Location = new Point
                {
                    X = this.Width / 3,
                    Y = this.Height / 3
                }
            };
            button1.Text = "Закрыть";
            button1.Click += button1_Click;
            this.Controls.Add(button1); // добавляем кнопку на форму
            this.Load += Form1_Load;
            this.MouseDown += Form1_MouseDown;
            this.MouseMove += Form1_MouseMove;
        }

        private void button1_Click(object sender, EventArgs e)
        {
            this.Close();
        }

        private void Form1_Load(object sender, EventArgs e)
        {
            System.Drawing.Drawing2D.GraphicsPath myPath = new System.Drawing.Drawing2D.GraphicsPath();
            // создаем эллипс с высотой и шириной формы
            myPath.AddEllipse(0, 0, this.Width, this.Height);
            // создаем с помощью элипса ту область формы, которую мы хотим видеть
            Region myRegion = new Region(myPath);
            // устанавливаем видимую область
            this.Region = myRegion;
        }

        private void Form1_MouseDown(object sender, MouseEventArgs e)
        {
            // если нажата левая кнопка мыши
            if (e.Button == MouseButtons.Left)
            {
                moveStart = new Point(e.X, e.Y);
            }
        }

        private void Form1_MouseMove(object sender, MouseEventArgs e)
        {
            // если нажата левая кнопка мыши
            if ((e.Button & MouseButtons.Left) != 0)
            {
                // получаем новую точку положения формы
                Point deltaPos = new Point(e.X - moveStart.X, e.Y - moveStart.Y);
                // устанавливаем положение формы
                this.Location = new Point(this.Location.X + deltaPos.X,
                  this.Location.Y + deltaPos.Y);
            }
        }
    }
}</code></pre>

                            <p>Создание области формы происходит в обработчике события <code>Form1_Load</code>. Для создания области используется графический путь - объект класса <code>System.Drawing.Drawing2D.GraphicsPath</code>, в который добавляется эллипс. Графический путь позволяет создать фигуру любой формы, поэтому, если мы захотим форму в виде морской звезды, то нам просто надо должным образом настроить используемый графический путь.</p>
                            
                            <p>Для закрытия формы в обработчике события нажатия кнопки <code>button1_Click</code> форма закрывается программным образом: <code>this.Close()</code></p>
                            
                            <p>Для перемещения формы обрабатываются два события формы - событие нажатия кнопки мыши и событие перемещения указателя мыши.</p>
                        `

                    <li>Принципы работы с контейнерами и стандартными элементами управления (кнопки, текстовые поля, списки и т.д.).</li>
                    <li>Как создавать меню, панели инструментов и работать с диалоговыми окнами.</li>
                    <li>Основы привязки данных и паттерна MVVM в контексте WinForms.</li>
                </ul>

                <h2>Структура курса</h2>
                <div id="home-syllabus" class="not-prose mt-6 space-y-3">
                    ${syllabusHTML}
                </div>

                <div class="mt-12 text-center">
                    <button onclick="loadLesson(0,0)" class="inline-flex items-center gap-2 px-8 py-4 bg-primary hover:bg-sky-600 text-white text-lg font-medium rounded-xl transition-colors shadow-md hover:shadow-lg">
                        Начать обучение (Глава 1)
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>
                    </button>
                </div>
            `;

            contentArea.style.opacity = '0';
            setTimeout(() => {
                contentArea.innerHTML = homeContent;
                contentArea.style.opacity = '1';
                document.querySelector('main').scrollTo(0, 0);
            }, 150);

            updateNavHighlight();
            updatePaginationButtons();
        }

        // Загрузка контента лекции
        function loadLesson(chapIdx, lessIdx) {
            currentChapterIndex = chapIdx;
            currentLessonIndex = lessIdx;
            
            const lesson = courseData[chapIdx].lessons[lessIdx];
            
            // Плавное появление контента
            contentArea.style.opacity = '0';
            setTimeout(() => {
                contentArea.innerHTML = lesson.content;
                contentArea.style.opacity = '1';
                
                // Применяем подсветку синтаксиса Visual Studio к блокам кода
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });

                // Прокрутка наверх при смене лекции
                document.querySelector('main').scrollTo(0, 0);
            }, 150);

            updateNavHighlight();
            updatePaginationButtons();
        }

        // Обновление подсветки активного пункта меню
        function updateNavHighlight() {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            btnHome.classList.remove('active');
            
            if (currentChapterIndex === -1) {
                // Активна главная страница
                btnHome.classList.add('active');
                return;
            }
            
            // Находим нужный элемент на основе индексов
            let globalIndex = 0;
            for (let i = 0; i < currentChapterIndex; i++) {
                globalIndex += courseData[i].lessons.length;
            }
            globalIndex += currentLessonIndex;
            
            const activeLink = document.querySelectorAll('.nav-item')[globalIndex];
            if (activeLink) {
                activeLink.classList.add('active');
                // Убеждаемся, что родительская глава развернута
                const lessonsList = activeLink.closest('ul');
                if (lessonsList.style.display === 'none') {
                    lessonsList.previousElementSibling.click();
                }
            }
        }

        // Обновление кнопок Вперед/Назад
        function updatePaginationButtons() {
            if (currentChapterIndex === -1) {
                // Если мы на главной, прячем обе нижние кнопки (используем кнопку в самом контенте)
                btnPrev.classList.add('hidden');
                btnNext.classList.add('hidden');
                return;
            }

            // Проверка кнопки Назад
            if (currentChapterIndex === 0 && currentLessonIndex === 0) {
                // На первой лекции кнопка Назад ведет на главную
                btnPrev.classList.remove('hidden');
                btnPrev.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
                    На главную
                `;
            } else {
                btnPrev.classList.remove('hidden');
                btnPrev.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
                    Предыдущая лекция
                `;
            }

            // Проверка кнопки Вперед
            if (currentChapterIndex === courseData.length - 1 && currentLessonIndex === courseData[currentChapterIndex].lessons.length - 1) {
                btnNext.classList.add('hidden');
            } else {
                btnNext.classList.remove('hidden');
                btnNextText.textContent = "Следующая лекция";
            }
        }

        // Обработчики для кнопок навигации
        btnPrev.addEventListener('click', () => {
            if (currentChapterIndex === 0 && currentLessonIndex === 0) {
                loadHome();
            } else if (currentLessonIndex > 0) {
                loadLesson(currentChapterIndex, currentLessonIndex - 1);
            } else if (currentChapterIndex > 0) {
                const prevChapIdx = currentChapterIndex - 1;
                loadLesson(prevChapIdx, courseData[prevChapIdx].lessons.length - 1);
            }
        });

        btnNext.addEventListener('click', () => {
            if (currentChapterIndex === -1) {
                loadLesson(0, 0); // С главной на первую лекцию
            } else if (currentLessonIndex < courseData[currentChapterIndex].lessons.length - 1) {
                loadLesson(currentChapterIndex, currentLessonIndex + 1);
            } else if (currentChapterIndex < courseData.length - 1) {
                loadLesson(currentChapterIndex + 1, 0);
            }
        });
        
        btnHome.addEventListener('click', (e) => {
            e.preventDefault();
            loadHome();
            closeMobileMenu();
        });

        // Мобильное меню
        function toggleMobileMenu() {
            const isClosed = sidebar.classList.contains('-translate-x-full');
            if (isClosed) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                closeMobileMenu();
            }
        }

        function closeMobileMenu() {
            if (window.innerWidth < 768) { // md breakpoint in tailwind
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        mobileMenuBtn.addEventListener('click', toggleMobileMenu);
        overlay.addEventListener('click', closeMobileMenu);

        // Инициализация при загрузке
        initNavigation();
        loadHome(); // Теперь загружаем главную страницу первой
    </script>
</body>
</html>
